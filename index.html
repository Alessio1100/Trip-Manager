<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Perù 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9992A;
  --gold-light: #E8B84B;
  --ink: #1A1208;
  --cream: #FAF6EE;
  --parchment: #F0E8D0;
  --moss: #3D5A2E;
  --border: #D4C4A0;
  --text: #2C2012;
  --muted: #7A6845;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); height: 100%; overscroll-behavior: none; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink); display: flex; z-index: 200;
  padding-bottom: var(--safe-bottom);
  box-shadow: 0 -2px 20px rgba(0,0,0,.3);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px 8px; border: none; background: none; color: #777;
  font-family: 'DM Sans', sans-serif; font-size: .6rem; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase; cursor: pointer; gap: 3px; transition: color .15s;
}
.nav-btn .ico { font-size: 1.3rem; line-height: 1; }
.nav-btn.active { color: var(--gold-light); }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold-light); visibility: hidden; }
.nav-btn.active .nav-dot { visibility: visible; }

/* ── PAGES ── */
.page { display: none; height: calc(100dvh - 62px - var(--safe-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page.active { display: block; }
.page-header { background: var(--ink); color: #fff; padding: 16px 16px 14px; position: sticky; top: 0; z-index: 50; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold-light); }
.page-header p { font-size: .75rem; color: #aaa; margin-top: 2px; }
.page-header-row { display: flex; align-items: center; justify-content: space-between; }

/* ── STATS ── */
.stats-scroll { display: flex; gap: 10px; padding: 14px 16px; overflow-x: auto; scrollbar-width: none; }
.stats-scroll::-webkit-scrollbar { display: none; }
.stat-pill { flex-shrink: 0; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; text-align: center; min-width: 80px; }
.stat-pill .val { font-size: 1.45rem; font-weight: 700; color: var(--ink); line-height: 1; }
.stat-pill .lbl { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
.stat-pill.hi .val { color: var(--gold); }

/* ── PROGRESS ── */
.section-block { padding: 0 16px 16px; }
.section-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 14px 0 8px; }
.prog-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.prog-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prog-label { font-size: .8rem; font-weight: 500; flex: 1; }
.prog-track { flex: 2; background: var(--parchment); border-radius: 99px; height: 5px; }
.prog-fill { height: 5px; border-radius: 99px; transition: width .5s; }
.prog-pct { font-size: .72rem; color: var(--muted); min-width: 30px; text-align: right; }

/* ── DASH CARDS ── */
.dash-card { margin: 0 16px 12px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
.dash-card-hdr { padding: 10px 14px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
.dash-card-hdr.urgent { background: #FEE2E2; color: #991B1B; }
.dash-card-hdr.done   { background: #DCFCE7; color: #166534; }
.dash-card-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #fff; border-top: 1px solid #f0e8d0; }
.dash-card-row .name { flex: 1; font-size: .86rem; font-weight: 500; }
.dash-card-row .cost { font-size: .83rem; font-weight: 700; color: var(--moss); }
.dash-card-row.u .cost { color: #991B1B; }

/* ── CHECKLIST ── */
.filter-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 58px; background: var(--cream); z-index: 40; border-bottom: 1px solid var(--border); }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: #fff; font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 600; color: var(--muted); cursor: pointer; }
.chip.active { background: var(--ink); color: var(--gold-light); border-color: var(--ink); }

.sec-label { padding: 12px 16px 5px; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.item-card { margin: 0 16px 8px; background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.item-card.done { opacity: .5; }
.item-card-main { display: flex; align-items: center; gap: 10px; padding: 12px 10px 12px 12px; }
.big-check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; flex-shrink: 0; transition: all .15s; }
.big-check.checked { background: var(--moss); border-color: var(--moss); color: #fff; }
.item-main-info { flex: 1; min-width: 0; }
.item-name { font-size: .88rem; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-card.done .item-name { text-decoration: line-through; }
.item-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.item-cost { font-size: .8rem; font-weight: 700; color: var(--moss); }
.item-date { font-size: .73rem; color: var(--muted); }
.item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn { width: 34px; height: 34px; border: none; background: var(--parchment); border-radius: 8px; font-size: .95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn:active { background: var(--border); }
.item-card-extra { border-top: 1px solid var(--parchment); padding: 7px 12px 8px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.item-note { font-size: .75rem; color: var(--muted); font-style: italic; padding: 0 12px 9px; line-height: 1.4; }

.badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: .7rem; font-weight: 600; white-space: nowrap; }
.badge-voli{background:#DBEAFE;color:#1E40AF} .badge-hotel{background:#FCE7F3;color:#9D174D} .badge-bus{background:#D1FAE5;color:#065F46}
.badge-trasporti{background:#FEF3C7;color:#92400E} .badge-tour{background:#EDE9FE;color:#5B21B6} .badge-ingressi{background:#FFEDD5;color:#9A3412}
.badge-documenti{background:#F3F4F6;color:#374151} .badge-salute{background:#ECFDF5;color:#065F46} .badge-homestay{background:#FEF9C3;color:#713F12}
.badge-cibo{background:#FFF7ED;color:#9A3412} .badge-varie{background:#F0FDF4;color:#166534}
.qb { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .7rem; font-weight: 600; }
.qb-s{background:#FEE2E2;color:#991B1B} .qb-p{background:#FEF3C7;color:#92400E} .qb-o{background:#DBEAFE;color:#1E40AF} .qb-l{background:#F3F4F6;color:#374151}
.cb { display: inline-flex; align-items: center; gap: 3px; padding: 2px 9px; border-radius: 99px; font-size: .7rem; font-weight: 600; }
.cb-g{background:#DCFCE7;color:#166534} .cb-y{background:#FEF9C3;color:#713F12} .cb-r{background:#FEE2E2;color:#991B1B}

.total-footer { margin: 8px 16px 16px; background: var(--ink); border-radius: 14px; padding: 15px 18px; display: flex; justify-content: space-between; align-items: center; }
.total-footer .lbl { font-size: .72rem; color: #aaa; } .total-footer .sub { font-size: .68rem; color: #777; margin-top: 1px; }
.total-footer .val { font-family: 'Playfair Display', serif; font-size: 1.55rem; font-weight: 700; color: var(--gold-light); }

/* ── FAB ── */
.fab { position: fixed; bottom: calc(70px + var(--safe-bottom) + 14px); right: 16px; width: 50px; height: 50px; background: var(--gold); color: var(--ink); border: none; border-radius: 50%; font-size: 1.4rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px rgba(201,153,42,.45); display: flex; align-items: center; justify-content: center; z-index: 150; transition: transform .15s; }
.fab:active { transform: scale(.92); }
.fab-dark { background: var(--ink); color: var(--gold-light); box-shadow: 0 4px 18px rgba(0,0,0,.25); }

/* ── ITINERARIO ── */
.day-card { margin: 0 16px 10px; background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.day-header { display: flex; align-items: stretch; cursor: pointer; }
.day-num { background: var(--ink); color: var(--gold-light); font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; padding: 13px 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 54px; line-height: 1; gap: 2px; }
.day-num small { font-family: 'DM Sans', sans-serif; font-size: .58rem; color: #aaa; font-weight: 400; text-transform: uppercase; }
.day-info { flex: 1; padding: 12px 10px; min-width: 0; }
.day-info h3 { font-size: .9rem; font-weight: 700; line-height: 1.3; }
.day-sub { font-size: .73rem; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
.day-chev { padding: 12px; display: flex; align-items: center; color: var(--muted); font-size: .9rem; transition: transform .2s; }
.day-chev.open { transform: rotate(180deg); }
.day-body { display: none; border-top: 1px solid var(--parchment); }
.day-body.open { display: block; }
.act-row { display: flex; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--parchment); align-items: flex-start; }
.act-row:last-of-type { border-bottom: none; }
.act-time { font-size: .7rem; font-weight: 700; color: var(--gold); min-width: 36px; padding-top: 2px; }
.act-ico { font-size: .95rem; padding-top: 1px; }
.act-info { flex: 1; }
.act-title { font-size: .84rem; font-weight: 600; line-height: 1.3; }
.act-note { font-size: .74rem; color: var(--muted); margin-top: 1px; }
.day-notes-box { background: #FFFBEB; padding: 9px 14px; font-size: .78rem; color: #92400E; border-top: 1px solid var(--parchment); }
.day-add-btn { width: 100%; background: none; border: none; border-top: 1px dashed var(--border); padding: 11px; font-family: 'DM Sans', sans-serif; font-size: .8rem; color: var(--muted); cursor: pointer; }

/* ── BUDGET ── */
.budget-summary { margin: 14px 16px; background: linear-gradient(135deg, var(--ink), #2A1A08); border-radius: 16px; padding: 20px; color: #fff; }
.budget-summary .big { font-family: 'Playfair Display', serif; font-size: 2.1rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
.budget-summary .lbl { font-size: .7rem; color: #aaa; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
.budget-summary .row2 { display: flex; justify-content: space-between; margin-top: 14px; }
.mini-stat .v { font-size: 1.05rem; font-weight: 700; }
.mini-stat .l { font-size: .65rem; color: #aaa; }
.g { color: #86EFAC; } .am { color: var(--gold-light); }
.budget-card { margin: 0 16px 12px; background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.budget-card h3 { padding: 11px 14px 9px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--parchment); }
.budget-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--parchment); gap: 10px; }
.budget-row:last-child { border-bottom: none; }
.br-label { flex: 1; font-size: .84rem; font-weight: 500; }
.br-sub { font-size: .7rem; color: var(--muted); }
.br-val { font-size: .86rem; font-weight: 700; }
.br-pct { font-size: .7rem; color: var(--muted); background: var(--parchment); padding: 2px 7px; border-radius: 99px; }

/* ── NOTE ── */
.notes-list { padding: 10px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.note-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.note-card-top { display: flex; align-items: center; padding: 11px 14px 9px; gap: 10px; }
.note-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.note-title-inp { flex: 1; border: none; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 700; color: var(--text); background: transparent; }
.note-title-inp:focus { outline: none; }
.note-del-btn { background: none; border: none; font-size: .95rem; color: #ccc; cursor: pointer; padding: 4px; }
.note-body-inp { width: 100%; border: none; border-top: 1px solid var(--parchment); font-family: 'DM Sans', sans-serif; font-size: .84rem; color: var(--text); padding: 10px 14px; background: var(--cream); resize: none; min-height: 88px; line-height: 1.5; }
.note-body-inp:focus { outline: none; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 500; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--cream); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding-bottom: calc(16px + var(--safe-bottom)); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 14px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; padding: 0 20px 13px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.fg { padding: 10px 20px 0; }
.fg label { display: block; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 5px; }
.fg input, .fg select, .fg textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 13px; font-family: 'DM Sans', sans-serif; font-size: .92rem; color: var(--text); background: #fff; appearance: none; -webkit-appearance: none; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--gold); }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; padding: 10px 20px 0; }
.frow .fg { padding: 0; }
.canc-row { margin: 10px 20px 0; background: #ECFDF5; border: 1.5px solid #6EE7B7; border-radius: 10px; padding: 12px 14px; }
.canc-row-top { display: flex; align-items: center; gap: 10px; }
.canc-row label { font-size: .88rem; font-weight: 600; color: #065F46; cursor: pointer; flex: 1; }
.canc-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--moss); cursor: pointer; flex-shrink: 0; }
.canc-row input[type=date] { border: 1.5px solid #6EE7B7; border-radius: 8px; padding: 8px 11px; font-size: .85rem; background: #fff; color: var(--text); width: 100%; margin-top: 9px; font-family: 'DM Sans', sans-serif; }
.modal-actions { display: flex; gap: 10px; padding: 14px 20px 0; }
.btn-cancel { flex: 1; background: var(--parchment); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; color: var(--muted); cursor: pointer; }
.btn-primary { flex: 2; background: var(--ink); border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 700; color: var(--gold-light); cursor: pointer; }
input[type="date"], input[type="time"] { min-height: 44px; }
select { min-height: 44px; }
</style>
</head>
<body>

<!-- ══ PAGES ══ -->
<div id="page-dashboard" class="page active">
  <div class="page-header"><h1>🦙 Perù 2026</h1><p>25 lug – 6 ago · 13 notti · 2 persone</p></div>
  <div class="stats-scroll" id="hero-stats"></div>
  <div class="section-block"><div class="section-title">Avanzamento per categoria</div><div id="cat-progress"></div></div>
  <div id="dash-urgent"></div>
  <div id="dash-recent"></div>
  <div style="height:20px"></div>
</div>

<div id="page-checklist" class="page">
  <div class="page-header">
    <div class="page-header-row">
      <div><h1>Checklist</h1><p id="cl-sub">…</p></div>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div id="checklist-content"></div>
  <div class="total-footer">
    <div><div class="lbl">Totale / persona</div><div class="sub" id="total-sub"></div></div>
    <div class="val" id="total-val"></div>
  </div>
  <div style="height:80px"></div>
  <button class="fab" onclick="openAddModal()">＋</button>
</div>

<div id="page-itinerario" class="page">
  <div class="page-header">
    <div class="page-header-row">
      <h1>Itinerario</h1>
      <button onclick="openAddDayModal()" style="background:none;border:none;color:var(--gold-light);font-size:1.3rem;cursor:pointer;padding:4px 0 4px 12px;">＋</button>
    </div>
  </div>
  <div style="height:10px"></div>
  <div id="itinerary-list"></div>
  <div style="height:80px"></div>
</div>

<div id="page-budget" class="page">
  <div class="page-header"><h1>Budget</h1></div>
  <div id="budget-content"></div>
  <div style="height:80px"></div>
</div>

<div id="page-note" class="page">
  <div class="page-header"><h1>Note</h1></div>
  <div class="notes-list" id="notes-list"></div>
  <div style="height:100px"></div>
  <button class="fab fab-dark" onclick="addNote()">＋</button>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)"><span class="ico">🗺</span>Home<div class="nav-dot"></div></button>
  <button class="nav-btn" onclick="showPage('checklist',this)"><span class="ico">✅</span>Lista<div class="nav-dot"></div></button>
  <button class="nav-btn" onclick="showPage('itinerario',this)"><span class="ico">📅</span>Giorni<div class="nav-dot"></div></button>
  <button class="nav-btn" onclick="showPage('budget',this)"><span class="ico">💶</span>Budget<div class="nav-dot"></div></button>
  <button class="nav-btn" onclick="showPage('note',this)"><span class="ico">📝</span>Note<div class="nav-dot"></div></button>
</nav>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Aggiungi Voce</div>
    <div class="fg"><label>Voce / Attività</label><input type="text" id="fm-voce" placeholder="es. Volo Lima – Cusco"></div>
    <div class="frow">
      <div class="fg"><label>Sezione</label><select id="fm-sezione"><option>PUNTI CRITICI (DA FARE SUBITO)</option><option>BUROCRAZIA E PRE-PARTENZA</option><option>ALLOGGI (DETTAGLIATI PER NOTTE)</option><option>TRASPORTI E LOGISTICA</option><option>TOUR E INGRESSI</option><option>VITA QUOTIDIANA (STIME)</option></select></div>
      <div class="fg"><label>Categoria</label><select id="fm-cat"><option>Voli</option><option>Hotel</option><option>Bus</option><option>Trasporti</option><option>Tour</option><option>Ingressi</option><option>Documenti</option><option>Salute</option><option>Homestay</option><option>Cibo</option><option>Varie</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Data</label><input type="date" id="fm-giorno"></div>
      <div class="fg"><label>Costo €/pers.</label><input type="number" id="fm-costo" placeholder="0"></div>
    </div>
    <div class="fg"><label>Quando prenotare</label><select id="fm-quando"><option>SUBITO</option><option>Prima di partire</option><option>Online</option><option>In loco</option><option>In loco/Online</option><option>In loco/Tour</option><option>Online/Agenzia</option></select></div>
    <div class="fg"><label>Note</label><textarea id="fm-note" rows="2"></textarea></div>
    <div class="canc-row">
      <div class="canc-row-top"><input type="checkbox" id="fm-canc" onchange="toggleCancField('fm-canc-date',this.checked)"><label for="fm-canc">🟢 Cancellazione gratuita</label></div>
      <input type="date" id="fm-canc-date" style="display:none">
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('add-modal')">Annulla</button><button class="btn-primary" onclick="saveNewItem()">Aggiungi</button></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Modifica Voce</div>
    <input type="hidden" id="em-id">
    <div class="fg"><label>Voce / Attività</label><input type="text" id="em-voce"></div>
    <div class="frow">

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  render(name);
}

function fmtDate(s){ if(!s)return'—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'}); }
function fmtEur(n){ return '€ '+Number(n).toLocaleString('it-IT'); }
function catBadge(c){ return `<span class="badge badge-${c.toLowerCase().replace(/[\s\/]/g,'')}">${c}</span>`; }
function qBadge(q){
  let cls='qb-l';
  if(q==='SUBITO') cls='qb-s';
  else if(q.includes('Prima')) cls='qb-p';
  else if(q.includes('Online')) cls='qb-o';
  return `<span class="qb ${cls}">${q}</span>`;
}
function cBadge(item){
  if(!item.cancGratuita) return '';
  if(!item.cancScadenza) return '<span class="cb cb-g">🟢 Canc. gratuita</span>';
  const oggi=new Date(); oggi.setHours(0,0,0,0);
  const scad=new Date(item.cancScadenza+'T00:00:00');
  const diff=Math.ceil((scad-oggi)/86400000);
  if(diff<0) return `<span class="cb cb-r">🔴 Scaduta ${fmtDate(item.cancScadenza)}</span>`;
  if(diff<=7) return `<span class="cb cb-y">🟡 Scade tra ${diff}g</span>`;
  return `<span class="cb cb-g">🟢 Canc. fino al ${fmtDate(item.cancScadenza)}</span>`;
}

function render(page){
  if(page==='dashboard') renderDashboard();
  if(page==='checklist') renderChecklist();
  if(page==='itinerario') renderItinerary();
  if(page==='budget') renderBudget();
  if(page==='note') renderNotes();
}
function renderAll(){ ['dashboard','checklist','itinerario','budget','note'].forEach(render); }

// ── DASHBOARD ──
function renderDashboard(){
  const total=data.items.reduce((s,i)=>s+i.costo,0);
  const done=data.items.filter(i=>i.done).length;
  const pct=Math.round(done/data.items.length*100);
  const subito=data.items.filter(i=>i.quando==='SUBITO'&&!i.done).length;
  const days=Math.ceil((new Date('2026-07-25')-new Date())/86400000);
  document.getElementById('hero-stats').innerHTML=`
    <div class="stat-pill hi"><div class="val">${days>0?days:'✈'}</div><div class="lbl">${days>0?'Giorni':'Partito!'}</div></div>
    <div class="stat-pill"><div class="val">${pct}%</div><div class="lbl">Fatto</div></div>
    <div class="stat-pill"><div class="val">${done}/${data.items.length}</div><div class="lbl">Voci ok</div></div>
    <div class="stat-pill"><div class="val" style="color:${subito>0?'#991B1B':'var(--moss)'};">${subito}</div><div class="lbl">Urgenti</div></div>
    <div class="stat-pill"><div class="val" style="font-size:1.1rem;">${fmtEur(total)}</div><div class="lbl">/persona</div></div>`;
  const cats={};
  data.items.forEach(i=>{ if(!cats[i.cat]) cats[i.cat]={t:0,d:0}; cats[i.cat].t++; if(i.done) cats[i.cat].d++; });
  document.getElementById('cat-progress').innerHTML=Object.entries(cats).map(([cat,v])=>{
    const p=Math.round(v.d/v.t*100),col=CAT_COLORS[cat]||'#999';
    return `<div class="prog-row"><div class="prog-dot" style="background:${col}"></div><div class="prog-label">${cat}</div><div class="prog-track"><div class="prog-fill" style="width:${p}%;background:${col}"></div></div><div class="prog-pct">${p}%</div></div>`;
  }).join('');
  const urgent=data.items.filter(i=>i.quando==='SUBITO'&&!i.done);
  document.getElementById('dash-urgent').innerHTML=`<div class="dash-card"><div class="dash-card-hdr urgent">🚨 Da fare subito</div>${
    !urgent.length?'<div class="dash-card-row"><div class="name" style="color:var(--moss)">✅ Tutto completato!</div></div>':
    urgent.map(i=>`<div class="dash-card-row u"><button class="big-check" onclick="toggleItem(${i.id})"></button><div class="name">${i.voce}</div><div class="cost">${fmtEur(i.costo)}</div></div>`).join('')
  }</div>`;
  const recent=[...data.items].filter(i=>i.done).slice(-4).reverse();
  document.getElementById('dash-recent').innerHTML=`<div class="dash-card"><div class="dash-card-hdr done">✅ Confermati recenti</div>${
    !recent.length?'<div class="dash-card-row"><div class="name" style="color:var(--muted)">Nessuno ancora</div></div>':
    recent.map(i=>`<div class="dash-card-row"><div style="color:var(--moss);font-size:.9rem;">✓</div><div class="name">${i.voce}</div><div class="cost">${fmtEur(i.costo)}</div></div>`).join('')
  }</div>`;
}

// ── CHECKLIST ──
let activeFilter='Tutto';
function renderChecklist(){
  const cats=['Tutto',...new Set(data.items.map(i=>i.cat))];
  document.getElementById('filter-bar').innerHTML=cats.map(c=>`<button class="chip ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
  const sections=[...new Set(data.items.map(i=>i.section))];
  let html='';
  sections.forEach(sec=>{
    let items=data.items.filter(i=>i.section===sec);
    if(activeFilter!=='Tutto') items=items.filter(i=>i.cat===activeFilter);
    if(!items.length) return;
    items=[...items].sort((a,b)=>{ if(!a.giorno&&!b.giorno)return 0; if(!a.giorno)return 1; if(!b.giorno)return -1; return a.giorno.localeCompare(b.giorno); });
    const icon=sec.includes('CRITICI')?'🚨':sec.includes('BURO')?'📋':sec.includes('ALLOGGI')?'🏨':sec.includes('TRASPORTI')?'🚌':sec.includes('TOUR')?'🎟️':'🍽️';
    html+=`<div class="sec-label"><span>${icon}</span>${sec.replace(' (DA FARE SUBITO)','').replace(' (DETTAGLIATI PER NOTTE)','').replace(' (STIME)','')}</div>`;
    items.forEach(i=>{
      html+=`<div class="item-card ${i.done?'done':''}">
        <div class="item-card-main">
          <button class="big-check ${i.done?'checked':''}" onclick="toggleItem(${i.id})">${i.done?'✓':''}</button>
          <div class="item-main-info">
            <div class="item-name">${i.voce}</div>
            <div class="item-meta">${i.costo>0?`<span class="item-cost">${fmtEur(i.costo)}</span>`:''} ${i.giorno?`<span class="item-date">${fmtDate(i.giorno)}</span>`:''}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="openEditModal(${i.id})">✏️</button>
            <button class="icon-btn" onclick="deleteItem(${i.id})">🗑</button>
          </div>
        </div>
        <div class="item-card-extra">${catBadge(i.cat)} ${qBadge(i.quando)} ${cBadge(i)}</div>
        ${i.note?`<div class="item-note">${i.note}</div>`:''}
      </div>`;
    });
  });
  document.getElementById('checklist-content').innerHTML=html;
  const t=data.items.reduce((s,i)=>s+i.costo,0);
  const d=data.items.filter(i=>i.done).length;
  document.getElementById('total-val').textContent=fmtEur(t);
  document.getElementById('total-sub').textContent=`x2 = ${fmtEur(t*2)} coppia`;
  document.getElementById('cl-sub').textContent=`${d}/${data.items.length} completati`;
}
function setFilter(f){ activeFilter=f; renderChecklist(); }
function toggleItem(id){ const i=data.items.find(x=>x.id===id); if(i){i.done=!i.done; saveData(); renderAll();} }
function deleteItem(id){ if(confirm('Eliminare?')){data.items=data.items.filter(i=>i.id!==id); saveData(); renderAll();} }

function openAddModal(){ document.getElementById('add-modal').classList.add('open'); }
function saveNewItem(){
  const voce=document.getElementById('fm-voce').value.trim(); if(!voce) return;
  const cg=document.getElementById('fm-canc').checked;
  data.items.push({id:data.nextId++,done:false,section:document.getElementById('fm-sezione').value,giorno:document.getElementById('fm-giorno').value,cat:document.getElementById('fm-cat').value,voce,quando:document.getElementById('fm-quando').value,costo:parseFloat(document.getElementById('fm-costo').value)||0,note:document.getElementById('fm-note').value,cancGratuita:cg,cancScadenza:cg?document.getElementById('fm-canc-date').value:''});
  document.getElementById('fm-canc').checked=false; document.getElementById('fm-canc-date').style.display='none'; document.getElementById('fm-canc-date').value='';
  saveData(); closeModal('add-modal'); renderAll();
}
function openEditModal(id){
  const i=data.items.find(x=>x.id===id); if(!i) return;
  document.getElementById('em-id').value=id;
  document.getElementById('em-sezione').value=i.section;
  document.getElementById('em-cat').value=i.cat;
  document.getElementById('em-voce').value=i.voce;
  document.getElementById('em-giorno').value=i.giorno||'';
  document.getElementById('em-costo').value=i.costo;
  document.getElementById('em-quando').value=i.quando;
  document.getElementById('em-note').value=i.note||'';
  const cc=document.getElementById('em-canc'),cd=document.getElementById('em-canc-date');
  cc.checked=!!i.cancGratuita; cd.value=i.cancScadenza||''; cd.style.display=i.cancGratuita?'block':'none';
  document.getElementById('edit-modal').classList.add('open');
}
function saveEditItem(){
  const id=parseInt(document.getElementById('em-id').value);
  const i=data.items.find(x=>x.id===id); if(!i) return;
  i.section=document.getElementById('em-sezione').value; i.cat=document.getElementById('em-cat').value;
  i.voce=document.getElementById('em-voce').value.trim(); i.giorno=document.getElementById('em-giorno').value;
  i.costo=parseFloat(document.getElementById('em-costo').value)||0; i.quando=document.getElementById('em-quando').value;
  i.note=document.getElementById('em-note').value; i.cancGratuita=document.getElementById('em-canc').checked;
  i.cancScadenza=i.cancGratuita?document.getElementById('em-canc-date').value:'';
  saveData(); closeModal('edit-modal'); renderAll();
}
function toggleCancField(fid,show){ const el=document.getElementById(fid); el.style.display=show?'block':'none'; if(!show) el.value=''; }

// ── ITINERARIO ──
function renderItinerary(){
  document.getElementById('itinerary-list').innerHTML=[...data.itinerary].sort((a,b)=>a.day-b.day).map(day=>`
    <div class="day-card">
      <div class="day-header" onclick="toggleDay(${day.id})">
        <div class="day-num">G${day.day}<small>${fmtDate(day.date)}</small></div>
        <div class="day-info"><h3>${day.title}</h3><div class="day-sub"><span>📍 ${day.place}</span>${day.hotel?`<span>🏨 ${day.hotel}</span>`:''}</div></div>
        <div class="day-chev" id="chev-${day.id}">▾</div>
      </div>
      <div class="day-body" id="body-${day.id}">
        ${day.activities.map(a=>`<div class="act-row"><div class="act-time">${a.time||'—'}</div><div class="act-ico">${a.type}</div><div class="act-info"><div class="act-title">${a.title}</div>${a.note?`<div class="act-note">${a.note}</div>`:''}</div></div>`).join('')}
        ${day.notes?`<div class="day-notes-box">📝 ${day.notes}</div>`:''}
        <button class="day-add-btn" onclick="openActivityModal(${day.id})">＋ Aggiungi attività</button>
      </div>
    </div>`).join('');
}
function toggleDay(id){ document.getElementById('body-'+id).classList.toggle('open'); document.getElementById('chev-'+id).classList.toggle('open'); }
function openActivityModal(dayId){ document.getElementById('activity-day-id').value=dayId; const d=data.itinerary.find(x=>x.id===dayId); document.getElementById('activity-modal-title').textContent='Aggiungi – Giorno '+(d?d.day:''); document.getElementById('add-activity-modal').classList.add('open'); }
function saveActivity(){
  const dayId=parseInt(document.getElementById('activity-day-id').value);
  const day=data.itinerary.find(d=>d.id===dayId); if(!day) return;
  const title=document.getElementById('act-title').value.trim(); if(!title) return;
  day.activities.push({time:document.getElementById('act-time').value,type:document.getElementById('act-type').value,title,note:document.getElementById('act-note').value});
  day.activities.sort((a,b)=>a.time.localeCompare(b.time));
  saveData(); closeModal('add-activity-modal'); renderItinerary();
  setTimeout(()=>{ document.getElementById('body-'+dayId).classList.add('open'); document.getElementById('chev-'+dayId).classList.add('open'); },50);
}
function openAddDayModal(){ document.getElementById('nd-num').value=data.itinerary.length+1; document.getElementById('add-day-modal').classList.add('open'); }
function saveNewDay(){
  const title=document.getElementById('nd-title').value.trim(); if(!title) return;
  data.itinerary.push({id:data.nextId++,date:document.getElementById('nd-date').value,day:parseInt(document.getElementById('nd-num').value)||0,title,place:document.getElementById('nd-place').value,hotel:document.getElementById('nd-hotel').value,notes:'',activities:[]});
  saveData(); closeModal('add-day-modal'); renderItinerary();
}

// ── BUDGET ──
function renderBudget(){
  const total=data.items.reduce((s,i)=>s+i.costo,0);
  const spent=data.items.filter(i=>i.done).reduce((s,i)=>s+i.costo,0);
  const byCat={};
  data.items.forEach(i=>{ if(!byCat[i.cat]) byCat[i.cat]={b:0,s:0}; byCat[i.cat].b+=i.costo; if(i.done) byCat[i.cat].s+=i.costo; });
  const bySec={};
  data.items.forEach(i=>{ const k=i.section.split('(')[0].trim(); if(!bySec[k]) bySec[k]=0; bySec[k]+=i.costo; });
  document.getElementById('budget-content').innerHTML=`
    <div class="budget-summary">
      <div class="lbl">Budget totale / persona</div>
      <div class="big">${fmtEur(total)}</div>
      <div class="row2">
        <div class="mini-stat"><div class="v g">${fmtEur(spent)}</div><div class="l">Confermato</div></div>
        <div class="mini-stat"><div class="v am">${fmtEur(total-spent)}</div><div class="l">Da prenotare</div></div>
        <div class="mini-stat"><div class="v">${fmtEur(total*2)}</div><div class="l">Coppia</div></div>
      </div>
    </div>
    <div class="budget-card"><h3>Per categoria</h3>${Object.entries(byCat).map(([cat,v])=>`
      <div class="budget-row">
        <div style="width:8px;height:8px;border-radius:50%;background:${CAT_COLORS[cat]||'#999'};flex-shrink:0"></div>
        <div class="br-label">${cat}<div class="br-sub">${fmtEur(v.s)} conf.</div></div>
        <div style="text-align:right"><div class="br-val">${fmtEur(v.b)}</div></div>
        <div class="br-pct">${Math.round(v.b/total*100)}%</div>
      </div>`).join('')}
    </div>
    <div class="budget-card"><h3>Per sezione</h3>${Object.entries(bySec).map(([s,v])=>`
      <div class="budget-row">
        <div class="br-label" style="font-size:.78rem;">${s}</div>
        <div class="br-val">${fmtEur(v)}</div>
        <div class="br-pct">${Math.round(v/total*100)}%</div>
      </div>`).join('')}
    </div>`;
}

// ── NOTE ──
const NOTE_COLORS=['#10B981','#3B82F6','#F59E0B','#8B5CF6','#EC4899','#EF4444','#14B8A6'];
function renderNotes(){
  document.getElementById('notes-list').innerHTML=data.notes.map(n=>`
    <div class="note-card">
      <div class="note-card-top">
        <div class="note-color-dot" style="background:${n.color}"></div>
        <input class="note-title-inp" value="${n.title}" oninput="saveNoteTitle(${n.id},this.value)">
        <button class="note-del-btn" onclick="deleteNote(${n.id})">✕</button>
      </div>
      <textarea class="note-body-inp" oninput="saveNoteBody(${n.id},this.value)">${n.text}</textarea>
    </div>`).join('');
}
function saveNoteTitle(id,v){ const n=data.notes.find(x=>x.id===id); if(n){n.title=v; saveData();} }
function saveNoteBody(id,v){ const n=data.notes.find(x=>x.id===id); if(n){n.text=v; saveData();} }
function deleteNote(id){ if(confirm('Eliminare?')){data.notes=data.notes.filter(n=>n.id!==id); saveData(); renderNotes();} }
function addNote(){ data.notes.push({id:data.nextId++,title:'Nuova nota',color:NOTE_COLORS[data.notes.length%NOTE_COLORS.length],text:''}); saveData(); renderNotes(); }

function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>{ m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }); });

renderAll();
</script>
</body>
</html>
